<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* ============================== */
        /* == 主题变量定义 == */
        /* ============================== */
        :root {
            /* 浅色模式变量 */
            --bg-body: #f5f7fa;
            --bg-card: #f3f3f3;
            --text-main: #333333;
            --text-light: #6c757d;
            --header-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --category-item-bg: #f8f9fa;
            --category-item-hover: #e9ecef;
            --accent-color: #6a11cb;
            --input-border: #ddd;
            
            /* 标签颜色 */
            --tag-english-color: #030303; /* 浅色模式下英文为蓝色 */
            --tag-chinese-color: #2575fc;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .theme-dark {
            /* 黑色模式变量 */
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #eeeeee;
            --text-light: #aaaaaa;
            --header-gradient: linear-gradient(135deg, #4b0d8f 0%, #1545cc 100%);
            --category-item-bg: #2c2c2c;
            --category-item-hover: #3a3a3a;
            --accent-color: #bb86fc;
            --input-border: #444;
            
            /* 关键修改：黑色模式下英文标签字体为白色 */
            --tag-english-color: #f3f3f3; 
            --tag-chinese-color: #87C120;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--header-gradient);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .status-bar {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* ============================== */
        /* == 控制区域（按钮+搜索框） == */
        /* ============================== */
        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid var(--accent-color);
            background: var(--bg-card);
            color: var(--accent-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            box-shadow: var(--shadow);
        }

        .theme-btn:hover {
            transform: scale(1.05);
            background: var(--accent-color);
            color: white;
        }

		/* 1. 定义容器样式，用于承载伪元素 */
		.tags-3d-input-container {
		    position: relative; /* 必须，用于定位伪元素 */
		    display: inline-block;
		    padding: 10px 0; /* 给上下留出空间 */
		    background: transparent;
		}
		
		/* 2. 定义实际的输入框样式 */
		.tags-3d-input-container input[type="text"] {
		    border: none; /* 移除默认边框 */
		    background: transparent; /* 背景透明 */
		    color: #333; /* 文本颜色 */
		    font-size: 16px;
		    padding: 10px 45px; /* 关键：给两侧的伪元素留出足够的内边距 */
		    width: 250px; /* 根据需要调整宽度 */
		    outline: none; /* 移除点击时的蓝色边框 */
		    font-family: monospace; /* 建议使用等宽字体，更符合“代码/标签”感 */
		}
		
		/* 3. 定义左侧括号和“tag:”文本 */
		.tags-3d-input-container::before {
		    content: "{ tag: "; /* 显示的内容 */
		    position: absolute;
		    left: 10px; /* 定位到左侧 */
		    top: 50%;
		    transform: translateY(-50%); /* 垂直居中 */
		    color: #8844ee; /* 你的紫色 */
		    font-weight: bold;
		    font-family: monospace;
		    font-size: 16px;
		    pointer-events: none; /* 允许点击穿透到输入框 */
		}
		
		/* 4. 定义右侧括号 */
		.tags-3d-input-container::after {
		    content: " }"; /* 显示的内容 */
		    position: absolute;
		    right: 15px; /* 定位到右侧 */
		    top: 50%;
		    transform: translateY(-50%); /* 垂直居中 */
		    color: #8844ee; /* 你的紫色 */
		    font-weight: bold;
		    font-family: monospace;
		    font-size: 16px;
		    pointer-events: none; /* 允许点击穿透到输入框 */
		}
		
		/* 5. 增加轻微的 3D/悬浮效果 (可选，响应你的初始需求) */
		.tags-3d-input-container {
		    border-radius: 8px;
		    transition: box-shadow 0.3s ease;
		}
		
		.tags-3d-input-container:hover {
		    box-shadow: 0 4px 12px rgba(136, 68, 238, 0.15); /* 淡淡的紫色投影 */
		}
		
		/* 6. 获得焦点时的特殊效果 */
		.tags-3d-input-container input[type="text"]:focus + .tags-3d-input-container::before,
		.tags-3d-input-container input[type="text"]:focus + .tags-3d-input-container::after {
		    color: #aa77ff; /* 聚焦时括号颜色变浅，增加动态感 */
		}

        /* ============================== */
        /* == 内容区域样式 == */
        /* ============================== */
        .main-content {
            display: flex;
            gap: 20px;
            display: none; /* 初始隐藏 */
        }
        
        .categories-sidebar {
            flex: 1;
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            box-shadow: var(--shadow);
            /* max-height: 80vh; */
            /* overflow-y: auto; */
        }
		
        .tags-display {
            flex: 6;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            align-content: start;
        }
        
        .category-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: var(--category-item-bg);
            border-radius: 8px;
            cursor: pointer;
			font-weight: 500;
        }
        
        .category-item:hover {
            background: var(--category-item-hover);
            padding-left: 20px;
        }
        
        .category-item.active {
            background: var(--accent-color);
            color: white;
        }
        
        .tag-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--accent-color);
        }

        .tag-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .tag-english {
            display: block;
            font-weight: 600;
            color: var(--tag-english-color); /* 动态颜色 */
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .tag-chinese {
            display: block;
			font-weight: 500;
            color: var(--tag-chinese-color);
        }
        
        .loading-text {
            text-align: center;
            padding: 100px;
            font-size: 1.2rem;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .categories-sidebar { max-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>标签管理工具</h1>
            <!-- <div id="statusText" class="status-bar">正在加载 GitHub 标签库...</div> -->
        </header>
        
        <div class="controls-wrapper">
            <button class="theme-btn" id="themeToggle" title="切换模式">
                <i class="fas fa-moon"></i>
            </button>
			<div class="tags-3d-input-container">
            	<input type="text" class="tags-3d-input-container" id="searchInput" placeholder="搜索英文或中文标签...">
			</div>
        </div>
        
        <div id="loadingView" class="loading-text">
            <i class="fas fa-spinner fa-spin"></i> 正在同步远程数据...
        </div>

        <div class="main-content" id="mainContainer">
            <aside class="categories-sidebar">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--input-border); padding-bottom: 5px;">分类</h3>
                <div id="categoriesList"></div>
            </aside>
            
            <main class="tags-display" id="tagsList"></main>
        </div>
    </div>

    <script>
        let fullData = {};
        const DATA_URL = 'https://raw.githubusercontent.com/riley3567/tags/main/Lables.txt';

        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            fetchData();
        });

        // ==============================
        // == 主题切换逻辑 ==
        // ==============================
        function initTheme() {
            const savedTheme = localStorage.getItem('user-theme') || 'light';
            applyTheme(savedTheme);

            document.getElementById('themeToggle').addEventListener('click', () => {
                const newTheme = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
                applyTheme(newTheme);
            });
        }

        function applyTheme(theme) {
            const btnIcon = document.querySelector('#themeToggle i');
            if (theme === 'dark') {
                document.body.classList.add('theme-dark');
                btnIcon.className = 'fas fa-sun';
                localStorage.setItem('user-theme', 'dark');
            } else {
                document.body.classList.remove('theme-dark');
                btnIcon.className = 'fas fa-moon';
                localStorage.setItem('user-theme', 'light');
            }
        }

        // ==============================
        // == 数据获取与解析 ==
        // ==============================
        async function fetchData() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error('网络请求失败');
                const text = await response.text();
                parseData(text);
                
                // 加载成功UI切换
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
                document.getElementById('searchInput').style.display = 'block';
                // document.getElementById('statusText').innerText = '数据已同步';
            } catch (err) {
                document.getElementById('loadingView').innerHTML = `<span style="color:red">加载失败: ${err.message}</span>`;
            }
        }

        function parseData(content) {
            const lines = content.split(/\r?\n/);
            let currentCat = null;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                if (trimmed.startsWith('[') && trimmed.endsWith(']')) {
                    currentCat = trimmed.slice(1, -1);
                    fullData[currentCat] = [];
                } else if (currentCat && trimmed.includes(' ')) {
                    const idx = trimmed.lastIndexOf(' ');
                    fullData[currentCat].push({
                        en: trimmed.slice(0, idx).trim(),
                        cn: trimmed.slice(idx + 1).trim()
                    });
                }
            });
            renderCategories();
        }

        // ==============================
        // == 渲染函数 ==
        // ==============================
        function renderCategories() {
            const list = document.getElementById('categoriesList');
            const keys = Object.keys(fullData);
            
            keys.forEach((cat, index) => {
                const div = document.createElement('div');
                div.className = 'category-item' + (index === 0 ? ' active' : '');
                div.innerText = cat;
                div.onclick = () => {
                    document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    renderTags(cat);
                };
                list.appendChild(div);
            });
            if (keys.length > 0) renderTags(keys[0]);
        }

        function renderTags(catName) {
            const container = document.getElementById('tagsList');
            container.innerHTML = '';
            fullData[catName].forEach(tag => {
                container.appendChild(createTagCard(tag));
            });
        }

        function createTagCard(tag) {
            const card = document.createElement('div');
            card.className = 'tag-card';
            card.innerHTML = `
                <span class="tag-english">${tag.en}</span>
                <span class="tag-chinese">${tag.cn}</span>
            `;
            return card;
        }

        // ==============================
        // == 搜索逻辑 ==
        // ==============================
        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const container = document.getElementById('tagsList');
            
            if (!val) {
                const activeCat = document.querySelector('.category-item.active').innerText;
                renderTags(activeCat);
                return;
            }

            container.innerHTML = '';
            Object.values(fullData).flat().forEach(tag => {
                if (tag.en.toLowerCase().includes(val) || tag.cn.includes(val)) {
                    container.appendChild(createTagCard(tag));
                }
            });
        };
    </script>
</body>
</html>
