<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>
        /* 页面背景（模拟 github.io 的深色/浅色效果） */
        body {
            background-color: #f8f9fa;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* 核心代码开始 */
        .tag-input-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s;
        }

        /* 模拟 tag-card 的紫色括号效果 */
        .tag-input-container::before,
        .tag-input-container::after {
            content: "";
            width: 10px;
            height: 100%;
            position: absolute;
            top: 0;
            border: 2.5px solid #8e44ad; /* 经典的紫色 */
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .tag-input-container::before {
            left: -5px;
            border-right: none;
        }

        .tag-input-container::after {
            right: -5px;
            border-left: none;
        }

        /* 输入框样式 */
        .tag-input-container input {
            border: 1px solid transparent;
            background: rgba(142, 68, 173, 0.05);
            padding: 10px 15px;
            font-size: 16px;
            color: #2c3e50;
            outline: none;
            border-radius: 4px;
        }

        /* 悬停与聚焦时的动态效果 */
        .tag-input-container:hover::before { left: -8px; }
        .tag-input-container:hover::after { right: -8px; }

        .tag-input-container:focus-within::before {
            left: 0;
            border-color: #9b59b6;
        }
        .tag-input-container:focus-within::after {
            right: 0;
            border-color: #9b59b6;
        }
        
        .tag-input-container input:focus {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* 核心代码结束 */
    </style>
</head>
<body>

    <div class="tag-input-container">
        <input type="text" placeholder="输入标签名称...">
    </div>

</body>
</html>
