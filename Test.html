<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* 默认浅色主题变量 */
        :root {
            --bg-color-main: #f5f7fa;
            --text-color-main: #333;
            --bg-color-header: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --text-color-header: white;
            --bg-color-card: white;
            --shadow-card: 0 4px 10px rgba(0, 0, 0, 0.05);
            --shadow-card-hover: 0 6px 15px rgba(0, 0, 0, 0.1);
            --bg-color-list-item: #f8f9fa;
            --bg-color-list-item-hover: #e9ecef;
            --bg-color-list-item-active: #6a11cb;
            --text-color-list-item-active: white;
            --bg-color-input: white;
            --text-color-input: #333;
            --border-color-input: #ddd;
            --accent-color-primary: #6a11cb;
            --text-color-light: #6c757d;
        }

        /* 黑色主题变量 */
        .theme-dark {
            --bg-color-main: #121212;
            --text-color-main: #eee;
            --bg-color-header: linear-gradient(135deg, #4b0d8f 0%, #1545cc 100%);
            --text-color-header: white;
            --bg-color-card: #1e1e1e;
            --shadow-card: 0 4px 10px rgba(0, 0, 0, 0.2);
            --shadow-card-hover: 0 6px 15px rgba(0, 0, 0, 0.3);
            --bg-color-list-item: #2c2c2c;
            --bg-color-list-item-hover: #3a3a3a;
            --bg-color-list-item-active: #6a11cb;
            --text-color-list-item-active: white;
            --bg-color-input: #333;
            --text-color-input: #eee;
            --border-color-input: #555;
            --accent-color-primary: #6a11cb;
            --text-color-light: #aaa;
        }

        body {
            background-color: var(--bg-color-main);
            color: var(--text-color-main);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-color-header);
            color: var(--text-color-header);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .status-bar {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            display: none; /* 初始隐藏 */
        }
        
        .categories {
            flex: 1;
            background: var(--bg-color-card);
            border-radius: 10px;
            padding: 10px;
            box-shadow: var(--shadow-card);
            max-height: 800px;
            overflow-y: auto;
        }
		
        .tags-container {
            flex: 7;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .category-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: var(--bg-color-list-item);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .category-item:hover {
            background: var(--bg-color-list-item-hover);
            transform: translateX(5px);
        }
        
        .category-item.active {
            background: var(--bg-color-list-item-active);
            color: var(--text-color-list-item-active);
        }
        
        .tag-card {
            background: var(--bg-color-card);
            border-radius: 10px;
            padding: 20px;
            box-shadow: var(--shadow-card);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
        }
        
        .tag-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-card-hover);
        }
        
        .tag-content {
            font-size: 1.0rem;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .tag-english { color: #2575fc; }
        .tag-chinese { color: #28a745; }
        
        /* 控制区域样式 (包含按钮和搜索) */
        .controls-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        /* 主题切换按钮样式 */
        .theme-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--bg-color-card);
            color: var(--accent-color-primary);
            border: 2px solid var(--accent-color-primary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-card);
        }

        .theme-toggle:hover {
            background-color: var(--accent-color-primary);
            color: var(--text-color-header);
        }

        .search-box {
            flex: 1; /* 占据剩余空间 */
            padding: 15px;
            border: 1px solid var(--border-color-input);
            border-radius: 8px;
            font-size: 1rem;
            background-color: var(--bg-color-input);
            color: var(--text-color-input);
            display: none;
        }
        
        .no-tags {
            text-align: center;
            padding: 40px;
            color: var(--text-color-light);
        }

        .loading-info {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--text-color-light);
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .controls-container { flex-direction: column; align-items: stretch; }
            .theme-toggle { align-self: center; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>标签管理工具</h1>
            <div id="statusInfo" class="status-bar">正在从 GitHub 获取最新标签...</div>
        </header>
        
        <div class="controls-container">
            <button class="theme-toggle" id="themeToggle" title="切换主题">
                <i class="fas fa-moon"></i>
            </button>
            <input type="text" class="search-box" placeholder="搜索标签..." id="searchInput">
        </div>
        
        <div id="loadingView" class="loading-info">
            正在同步 GitHub 数据，请稍候...
        </div>

        <div class="main-content" id="main-content">
            <div class="categories">
                <h3>分类</h3>
                <div id="categoriesList"></div>
            </div>
            
            <div class="tags-container" id="tagsContainer"></div>
        </div>
    </div>

    <script>
        let tagsData = {};
        const STATUS_INFO = document.getElementById('statusInfo');
        const MAIN_CONTENT = document.getElementById('main-content');
        const SEARCH_BOX = document.getElementById('searchInput');
        const LOADING_VIEW = document.getElementById('loadingView');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');

        // 设置为你的 GitHub Raw 地址
        const DATA_SOURCE_URL = 'https://raw.githubusercontent.com/riley3567/tags/main/Lables.txt';

        window.addEventListener('DOMContentLoaded', initializePage);

        function initializePage() {
            // 1. 初始化主题
            const savedTheme = localStorage.getItem('app-theme') || 'theme-light';
            setTheme(savedTheme);

            // 2. 加载数据
            loadTagsFromGitHub();
        }

        // 处理主题切换按钮的点击
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.body.className === 'theme-dark' ? 'theme-dark' : 'theme-light';
            const newTheme = currentTheme === 'theme-light' ? 'theme-dark' : 'theme-light';
            setTheme(newTheme);
        });

        // 设置主题并保存用户偏好的函数
        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('app-theme', theme);

            // 根据当前主题更新图标
            if (theme === 'theme-dark') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeToggle.title = '切换到浅色主题';
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeToggle.title = '切换到深色主题';
            }
        }

        async function loadTagsFromGitHub() {
            try {
                const response = await fetch(DATA_SOURCE_URL);
                
                if (!response.ok) {
                    throw new Error(`无法获取文件 (HTTP ${response.status})`);
                }
                
                const content = await response.text();
                parseFileContent(content);
                
                STATUS_INFO.textContent = `同步成功：已加载最新标签数据`;
                LOADING_VIEW.style.display = 'none';
                MAIN_CONTENT.style.display = 'flex';
                SEARCH_BOX.style.display = 'block';
                
            } catch (error) {
                console.error('Error:', error);
                STATUS_INFO.textContent = `同步失败：${error.message}`;
                LOADING_VIEW.innerHTML = `
                    <p style="color: #e74c3c;">❌ 无法从 GitHub 加载数据</p>
                    <p style="font-size: 1rem; margin-top:10px;">请检查仓库中是否存在 <b>Lables.txt</b> 且链接正确。</p>
                `;
            }
        }

        function parseFileContent(content) {
            tagsData = {};
            // 兼容不同换行符
            const lines = content.split(/\r?\n/);
            let currentCategory = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') continue;
                
                // 匹配 [分类名]
                if (line.startsWith('[') && line.endsWith(']')) {
                    currentCategory = line.substring(1, line.length - 1);
                    tagsData[currentCategory] = { name: currentCategory, tags: [] };
                } 
                // 匹配 "英文 中文" (以最后一个空格分割)
                else if (currentCategory && line.includes(' ')) {
                    const lastSpaceIndex = line.lastIndexOf(' ');
                    if (lastSpaceIndex !== -1) {
                        const englishPart = line.substring(0, lastSpaceIndex).trim();
                        const chinesePart = line.substring(lastSpaceIndex + 1).trim();
                        tagsData[currentCategory].tags.push({
                            english: englishPart,
                            chinese: chinesePart
                        });
                    }
                }
            }
            displayCategoriesAndTags();
        }
        
        function displayCategoriesAndTags() {
            const categoriesList = document.getElementById('categoriesList');
            categoriesList.innerHTML = '';
            const categories = Object.keys(tagsData);
            
            if (categories.length === 0) {
                categoriesList.innerHTML = '<div class="no-tags"><p>文件中未发现有效分类</p></div>';
                return;
            }
            
            for (const category of categories) {
                const categoryElement = document.createElement('div');
                categoryElement.className = 'category-item';
                categoryElement.textContent = tagsData[category].name;
                categoryElement.dataset.category = category;
                
                categoryElement.addEventListener('click', function() {
                    document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                    this.classList.add('active');
                    displayTags(category);
                });
                categoriesList.appendChild(categoryElement);
            }
            
            // 默认选中第一个
            categoriesList.children[0].classList.add('active');
            displayTags(categories[0]);
        }
        
        function displayTags(categoryKey) {
            const tagsContainer = document.getElementById('tagsContainer');
            tagsContainer.innerHTML = '';
            const category = tagsData[categoryKey];
            
            if (!category || category.tags.length === 0) {
                tagsContainer.innerHTML = '<div class="no-tags"><p>此分类下没有标签</p></div>';
                return;
            }
            
            category.tags.forEach(tag => {
                const tagCard = document.createElement('div');
                tagCard.className = 'tag-card';
                tagCard.innerHTML = `
                    <div class="tag-content">
                        <span class="tag-english">${tag.english}</span><br>
                        <span class="tag-chinese">${tag.chinese}</span>
                    </div>
                `;
                tagsContainer.appendChild(tagCard);
            });
        }
        
        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const tagsContainer = document.getElementById('tagsContainer');
            
            if (!searchTerm) {
                const activeCategory = document.querySelector('.category-item.active');
                if (activeCategory) displayTags(activeCategory.dataset.category);
                return;
            }
            
            tagsContainer.innerHTML = '';
            let foundResults = false;
            
            for (const [key, category] of Object.entries(tagsData)) {
                const matchingTags = category.tags.filter(tag => 
                    tag.english.toLowerCase().includes(searchTerm) || 
                    tag.chinese.toLowerCase().includes(searchTerm)
                );
                
                matchingTags.forEach(tag => {
                    foundResults = true;
                    const tagCard = document.createElement('div');
                    tagCard.className = 'tag-card';
                    tagCard.innerHTML = `
                        <div class="tag-content">
                            <span class="tag-english">${tag.english}</span><br>
                            <span class="tag-chinese">${tag.chinese}</span>
                        </div>
                    `;
                    tagsContainer.appendChild(tagCard);
                });
            }
            
            if (!foundResults) {
                tagsContainer.innerHTML = '<div class="no-tags"><p>没有找到匹配的标签</p></div>';
            }
        });
    </script>
</body>
</html>
