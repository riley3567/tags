<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理工具 - 自动加载版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .status-bar {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            /* 初始可见性取决于是否加载成功 */
            display: none; 
        }
        
        .categories {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            /* max-height: 800px; */
            overflow-y: auto;
        }
		
        .tags-container {
            flex: 7;
            display: grid;
			align-content: start;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        
        .category-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .category-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .category-item.active {
            background: #6a11cb;
            color: white;
        }
        
        .tag-card {
            background: white;
            border-radius: 10px;
			padding: 15px 20px 15px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
        
        .tag-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }
        
        .tag-content {
            font-size: 1.0rem;
            font-weight: 500;
        }
		
		.tag-content p {
            margin: 5px 0px;
        }
        
        .tag-english { color: #2575fc; }
        .tag-chinese { color: #28a745; }
        
        .search-box {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
            display: none; /* 初始隐藏 */
        }
        
        .no-tags {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .loading-info {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>标签管理工具</h1>
            <div id="statusInfo" class="status-bar">正在尝试读取 Lables.txt...</div>
        </header>
        
        <input type="text" class="search-box" placeholder="搜索标签..." id="searchInput">
        
        <div id="loadingView" class="loading-info">
            数据加载中，请稍候...
        </div>

        <div class="main-content" id="main-content">
            <div class="categories">
                <h3>分类</h3>
                <div id="categoriesList"></div>
            </div>
            
            <div class="tags-container" id="tagsContainer"></div>
        </div>
    </div>

    <script>
        let tagsData = {};
        const STATUS_INFO = document.getElementById('statusInfo');
        const MAIN_CONTENT = document.getElementById('main-content');
        const SEARCH_BOX = document.getElementById('searchInput');
        const LOADING_VIEW = document.getElementById('loadingView');

        // 页面加载完成后自动执行
        window.addEventListener('DOMContentLoaded', loadDefaultFile);

        async function loadDefaultFile() {
            const fileName = 'Lables.txt'; // 目标文件名
            
            try {
                const response = await fetch(fileName);
                
                if (!response.ok) {
                    throw new Error(`无法找到文件 ${fileName} (错误代码: ${response.status})`);
                }
                
                const content = await response.text();
                parseFileContent(content);
                
                // 加载成功后的UI处理
                STATUS_INFO.textContent = `成功加载: ${fileName}`;
                LOADING_VIEW.style.display = 'none';
                MAIN_CONTENT.style.display = 'flex';
                SEARCH_BOX.style.display = 'block';
                
            } catch (error) {
                console.error('Error:', error);
                STATUS_INFO.textContent = `加载失败: ${error.message}`;
                LOADING_VIEW.innerHTML = `
                    <p style="color: #e74c3c;">❌ 加载失败</p>
                    <p style="font-size: 1rem; margin-top:10px;">请确保服务器同级目录下存在 <b>${fileName}</b> 文件。</p>
                `;
            }
        }

        function parseFileContent(content) {
            tagsData = {};
            const lines = content.split('\n');
            let currentCategory = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') continue;
                
                if (line.startsWith('[') && line.endsWith(']')) {
                    currentCategory = line.substring(1, line.length - 1);
                    tagsData[currentCategory] = { name: currentCategory, tags: [] };
                } 
                else if (currentCategory && line.includes(' ')) {
                    const lastSpaceIndex = line.lastIndexOf(' ');
                    if (lastSpaceIndex !== -1) {
                        const englishPart = line.substring(0, lastSpaceIndex).trim();
                        const chinesePart = line.substring(lastSpaceIndex + 1).trim();
                        tagsData[currentCategory].tags.push({
                            english: englishPart,
                            chinese: chinesePart
                        });
                    }
                }
            }
            displayCategoriesAndTags();
        }
        
        function displayCategoriesAndTags() {
            const categoriesList = document.getElementById('categoriesList');
            categoriesList.innerHTML = '';
            const categories = Object.keys(tagsData);
            
            if (categories.length === 0) {
                categoriesList.innerHTML = '<div class="no-tags"><p>文件中未发现有效分类</p></div>';
                return;
            }
            
            for (const category of categories) {
                const categoryElement = document.createElement('div');
                categoryElement.className = 'category-item';
                categoryElement.textContent = tagsData[category].name;
                categoryElement.dataset.category = category;
                
                categoryElement.addEventListener('click', function() {
                    document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                    this.classList.add('active');
                    displayTags(category);
                });
                categoriesList.appendChild(categoryElement);
            }
            
            // 默认选中第一个
            categoriesList.children[0].classList.add('active');
            displayTags(categories[0]);
        }
        
        function displayTags(categoryKey) {
            const tagsContainer = document.getElementById('tagsContainer');
            tagsContainer.innerHTML = '';
            const category = tagsData[categoryKey];
            
            if (!category || category.tags.length === 0) {
                tagsContainer.innerHTML = '<div class="no-tags"><p>此分类下没有标签</p></div>';
                return;
            }
            
            category.tags.forEach(tag => {
                const tagCard = document.createElement('div');
                tagCard.className = 'tag-card';
                tagCard.innerHTML = `
                    <div class="tag-content">
                        <p><span class="tag-english">${tag.english}</span></p>
                        <p><span class="tag-chinese">${tag.chinese}</span></p>
                    </div>
                `;
                tagsContainer.appendChild(tagCard);
            });
        }
        
        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const tagsContainer = document.getElementById('tagsContainer');
            
            if (!searchTerm) {
                const activeCategory = document.querySelector('.category-item.active');
                if (activeCategory) displayTags(activeCategory.dataset.category);
                return;
            }
            
            tagsContainer.innerHTML = '';
            let foundResults = false;
            
            for (const [key, category] of Object.entries(tagsData)) {
                const matchingTags = category.tags.filter(tag => 
                    tag.english.toLowerCase().includes(searchTerm) || 
                    tag.chinese.toLowerCase().includes(searchTerm)
                );
                
                matchingTags.forEach(tag => {
                    foundResults = true;
                    const tagCard = document.createElement('div');
                    tagCard.className = 'tag-card';
                    tagCard.innerHTML = `
                        <div class="tag-content">
                            <p><span class="tag-english">${tag.english}</span></p>
                            <p><span class="tag-chinese">${tag.chinese}</span></p>
                        </div>
                    `;
                    tagsContainer.appendChild(tagCard);
                });
            }
            
            if (!foundResults) {
                tagsContainer.innerHTML = '<div class="no-tags"><p>没有找到匹配的标签</p></div>';
            }
        });
    </script>
</body>
</html>
