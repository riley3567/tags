<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理工具 - Web版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            visibility: hidden; /* 初始隐藏，解析后再显示 */
        }
        
        .categories {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            max-height: 800px;
            overflow-y: auto;
        }
		
        .tags-container {
            flex: 7;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .category-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .category-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .category-item.active {
            background: #6a11cb;
            color: white;
        }
        
        .tag-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
        
        .tag-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }
        
        .tag-content {
            font-size: 1.0rem;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .tag-english { color: #2575fc; }
        .tag-chinese { color: #28a745; }
        
        /* 修改后的 URL 输入区域样式 */
        .url-fetch-area {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 10px;
        }
        
        .url-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .url-input:focus {
            border-color: #6a11cb;
        }
        
        .fetch-btn {
            padding: 12px 25px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
            white-space: nowrap;
        }
        
        .fetch-btn:hover { background: #5a0fb8; }
        .fetch-btn:disabled { background: #ccc; cursor: not-allowed; }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        
        .no-tags {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .url-fetch-area { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>标签管理工具</h1>
            <p style="opacity: 0.8;">输入文本文件 URL 并解析</p>
        </header>
        <!--
        <div class="url-fetch-area">
            <input type="text" id="urlInput" class="url-input" placeholder="请输入文本文件的 Web 地址 (如: https://example.com/tags.txt)">
            <button class="fetch-btn" id="fetchBtn">读取并解析</button>
        </div>
		-->
        <input type="text" class="search-box" placeholder="搜索标签..." id="searchInput">
        
        <div class="main-content" id="main-content">
            <div class="categories">
                <h3>分类</h3>
                <div id="categoriesList">
                    <div class="no-tags"><p>请加载地址查看分类</p></div>
                </div>
            </div>
            
            <div class="tags-container" id="tagsContainer">
                <div class="no-tags"><p>暂无标签数据</p></div>
            </div>
        </div>
    </div>

    <script>
        let tagsData = {};
        const fetchBtn = document.getElementById('fetchBtn');
        // const urlInput = document.getElementById('urlInput');
		const urlInput = 'https://riley3567.github.io/tags/Lables.txt';
        const mainContent = document.getElementById('main-content');

        // 处理点击抓取
        fetchBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) {
                alert("请输入有效的 URL 地址");
                return;
            }

            try {
                fetchBtn.disabled = true;
                fetchBtn.textContent = '读取中...';
                
                // 使用 fetch API 获取内容
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`无法访问该地址: ${response.status} ${response.statusText}`);
                }
                
                const content = await response.text();
                parseFileContent(content);
                
            } catch (error) {
                console.error('Fetch Error:', error);
                alert(`读取失败！\n原因：${error.message}\n提示：如果地址正确，通常是因为跨域(CORS)限制，目标服务器不允许外部访问。`);
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.textContent = '读取并解析';
            }
        });

        // 解析逻辑（保持原样，仅做微调）
        function parseFileContent(content) {
            tagsData = {};
            const lines = content.split('\n');
            let currentCategory = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') continue;
                
                if (line.startsWith('[') && line.endsWith(']')) {
                    currentCategory = line.substring(1, line.length - 1);
                    tagsData[currentCategory] = { name: currentCategory, tags: [] };
                } 
                else if (currentCategory && line.includes(' ')) {
                    const lastSpaceIndex = line.lastIndexOf(' ');
                    if (lastSpaceIndex !== -1) {
                        const englishPart = line.substring(0, lastSpaceIndex).trim();
                        const chinesePart = line.substring(lastSpaceIndex + 1).trim();
                        tagsData[currentCategory].tags.push({
                            english: englishPart,
                            chinese: chinesePart
                        });
                    }
                }
            }
			
            if (Object.keys(tagsData).length > 0) {
                mainContent.style.visibility = "visible";
                displayCategoriesAndTags();
            } else {
                alert("文件内容格式不正确，未解析到标签。");
            }
        }
        
        function displayCategoriesAndTags() {
            const categoriesList = document.getElementById('categoriesList');
            categoriesList.innerHTML = '';
            const categories = Object.keys(tagsData);
            
            if (categories.length === 0) return;
            
            for (const category of categories) {
                const categoryElement = document.createElement('div');
                categoryElement.className = 'category-item';
                categoryElement.textContent = tagsData[category].name;
                categoryElement.dataset.category = category;
                
                categoryElement.addEventListener('click', function() {
                    document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                    this.classList.add('active');
                    displayTags(category);
                });
                categoriesList.appendChild(categoryElement);
            }
            
            categoriesList.children[0].classList.add('active');
            displayTags(categories[0]);
        }
        
        function displayTags(categoryKey) {
            const tagsContainer = document.getElementById('tagsContainer');
            tagsContainer.innerHTML = '';
            const category = tagsData[categoryKey];
            
            if (!category || category.tags.length === 0) return;
            
            category.tags.forEach(tag => {
                const tagCard = document.createElement('div');
                tagCard.className = 'tag-card';
                tagCard.innerHTML = `
                    <div class="tag-content">
                        <span class="tag-english">${tag.english}</span><br>
                        <span class="tag-chinese">${tag.chinese}</span>
                    </div>
                `;
                tagsContainer.appendChild(tagCard);
            });
        }
        
        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const tagsContainer = document.getElementById('tagsContainer');
            
            if (!searchTerm) {
                const activeCategory = document.querySelector('.category-item.active');
                if (activeCategory) displayTags(activeCategory.dataset.category);
                return;
            }
            
            tagsContainer.innerHTML = '';
            let foundResults = false;
            
            for (const [key, category] of Object.entries(tagsData)) {
                const matchingTags = category.tags.filter(tag => 
                    tag.english.toLowerCase().includes(searchTerm) || 
                    tag.chinese.toLowerCase().includes(searchTerm)
                );
                
                matchingTags.forEach(tag => {
                    foundResults = true;
                    const tagCard = document.createElement('div');
                    tagCard.className = 'tag-card';
                    tagCard.innerHTML = `
                        <div class="tag-content">
                            <span class="tag-english">${tag.english}</span><br>
                            <span class="tag-chinese">${tag.chinese}</span>
                        </div>
                    `;
                    tagsContainer.appendChild(tagCard);
                });
            }
            
            if (!foundResults) {
                tagsContainer.innerHTML = '<div class="no-tags"><p>没有找到匹配的标签</p></div>';
            }
        });
    </script>
</body>
</html>
