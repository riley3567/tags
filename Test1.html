<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 玻璃态标签管理工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Segoe UI', Roboto, sans-serif;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        :root {
            /* 亮色模式 - 参考图中的柔和色彩 */
            --bg-body: #eef2f7;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #3a3a4f;
            --text-color: #2575fc;
            --accent-color: #9d8df1; /* 柔和紫色 */
            --shadow-light: rgba(255, 255, 255, 0.8);
            --shadow-dark: rgba(166, 180, 200, 0.4);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .theme-dark {
            --bg-body: #1a1a2e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --text-color: #87C120;
            --accent-color: #bb86fc;
            --shadow-light: rgba(255, 255, 255, 0.05);
            --shadow-dark: rgba(0, 0, 0, 0.5);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            /* 页面背景装饰，增加3D氛围 */
            background-image: radial-gradient(circle at 10% 20%, rgba(157, 141, 241, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(106, 17, 203, 0.1) 0%, transparent 40%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- 头部样式 --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--card-shadow), inset 0 0 15px var(--shadow-light);
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--text-main), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- 控制区 --- */
        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .theme-btn {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 5px 5px 15px var(--shadow-dark), -5px -5px 15px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:active {
            box-shadow: inset 3px 3px 10px var(--shadow-dark), inset -3px -3px 10px var(--shadow-light);
        }

        .search-container {
            position: relative;
            flex-grow: 1;
        }

        .search-box {
            width: 100%;
            padding: 18px 25px;
            padding-right: 60px; /* 为右侧清除按钮留位 */
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            font-size: 1.1rem;
            /* 关键：字体居右 */
            text-align: right; 
            outline: none;
            box-shadow: 5px 5px 15px var(--shadow-dark), -5px -5px 15px var(--shadow-light);
        }

        .search-box:focus {
            box-shadow: inset 2px 2px 8px var(--shadow-dark), 0 0 15px rgba(157, 141, 241, 0.3);
            border-color: var(--accent-color);
        }

        .clear-btn {
            position: absolute;
            left: 20px; /* 因为文字居右，所以清除按钮放在左边更协调 */
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1.2rem;
            display: none;
        }

        /* --- 主体布局 --- */
        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        /* --- 侧边栏玻璃态 --- */
        .categories-sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            height: fit-content;
        }

        .category-item {
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-main);
            border: 1px solid transparent;
            /* 初始状态不晃动，仅阴影变化 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .category-item:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--glass-border);
        }

        .category-item.active {
            background: var(--accent-color);
            color: white;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2), 0 5px 15px rgba(157, 141, 241, 0.4);
        }

        /* --- 标签卡片玻璃态 --- */
        .tags-display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .tag-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 5px 5px 15px var(--shadow-dark), -5px -5px 15px var(--shadow-light);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* 模拟图片中的3D左侧装饰条 */
        .tag-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 6px;
            background: var(--accent-color);
            border-radius: 0 10px 10px 0;
            box-shadow: 2px 0 10px rgba(157, 141, 241, 0.5);
        }

        .tag-card:hover {
            /* 悬停时不产生位移，仅增强光泽 */
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 8px 8px 20px var(--shadow-dark), -8px -8px 20px var(--shadow-light);
        }

        .tag-english {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .tag-chinese {
            display: block;
            font-size: 1rem;
            opacity: 0.7;
            font-weight: 500;
            color: var(--text-color);
        }

        /* 复制成功的提示泡 */
        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-color);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* 加载状态 */
        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            font-size: 1.2rem;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
            .controls-wrapper { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TAGS MANAGER</h1>
    </header>

    <div class="controls-wrapper">
        <button class="theme-btn" id="themeToggle" title="切换主题">
            <i class="fas fa-moon"></i>
        </button>
        <div class="search-container">
            <input type="text" class="search-box" id="searchInput" placeholder="...搜索标签">
            <button class="clear-btn" id="clearBtn"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="main-content">
        <aside class="categories-sidebar">
            <div id="categoriesList"></div>
        </aside>
        <main class="tags-display" id="tagsList">
            <div class="loading-text">
                <i class="fas fa-circle-notch fa-spin"></i> 正在加载玻璃态界面...
            </div>
        </main>
    </div>
</div>

<script>
    let fullData = {};
    const DATA_URL = 'https://raw.githubusercontent.com/riley3567/tags/main/Lables.txt';
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const tagsList = document.getElementById('tagsList');

    document.addEventListener('DOMContentLoaded', () => {
        initTheme();
        fetchData();
    });

    function initTheme() {
        const savedTheme = localStorage.getItem('glass-theme') || 'light';
        applyTheme(savedTheme);
        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.body.classList.contains('theme-dark');
            applyTheme(isDark ? 'light' : 'dark');
        };
    }

    function applyTheme(theme) {
        const icon = document.querySelector('#themeToggle i');
        if (theme === 'dark') {
            document.body.classList.add('theme-dark');
            icon.className = 'fas fa-sun';
        } else {
            document.body.classList.remove('theme-dark');
            icon.className = 'fas fa-moon';
        }
        localStorage.setItem('glass-theme', theme);
    }

    async function fetchData() {
        try {
            const response = await fetch(DATA_URL);
            const text = response.ok ? await response.text() : getMockData();
            parseData(text);
        } catch (err) {
            parseData(getMockData());
        }
    }

    function getMockData() {
        return `[常用标签]\nbeautiful 美丽的\nfast 快速的\nminimalist 极简的\n[界面设计]\nglassmorphism 玻璃拟态\nneumorphism 新拟态\n3d-effect 3D效果`;
    }

    function parseData(content) {
        const lines = content.split(/\r?\n/);
        let currentCat = null;
        fullData = {};
        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed) return;
            if (trimmed.startsWith('[') && trimmed.endsWith(']')) {
                currentCat = trimmed.slice(1, -1);
                fullData[currentCat] = [];
            } else if (currentCat && trimmed.includes(' ')) {
                const idx = trimmed.lastIndexOf(' ');
                fullData[currentCat].push({
                    en: trimmed.slice(0, idx).trim(),
                    cn: trimmed.slice(idx + 1).trim()
                });
            }
        });
        renderCategories();
    }

    function renderCategories() {
        const list = document.getElementById('categoriesList');
        list.innerHTML = '';
        const keys = Object.keys(fullData);
        keys.forEach((cat, index) => {
            const div = document.createElement('div');
            div.className = `category-item ${index === 0 ? 'active' : ''}`;
            div.innerText = cat;
            div.onclick = () => {
                document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                searchInput.value = '';
                clearBtn.style.display = 'none';
                renderTags(cat);
            };
            list.appendChild(div);
        });
        if (keys.length > 0) renderTags(keys[0]);
    }

    function renderTags(catName) {
        tagsList.innerHTML = '';
        if(fullData[catName]) {
            fullData[catName].forEach(tag => tagsList.appendChild(createTagCard(tag)));
        }
    }

    function createTagCard(tag) {
        const card = document.createElement('div');
        card.className = 'tag-card';
        card.innerHTML = `<span class="tag-english">${tag.en}</span><span class="tag-chinese">${tag.cn}</span>`;
        
        card.onclick = () => {
            navigator.clipboard.writeText(tag.en).then(() => {
                showToast(`已复制: ${tag.en}`);
            });
        };
        return card;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    searchInput.oninput = (e) => {
        const val = e.target.value.toLowerCase().trim();
        clearBtn.style.display = val ? 'block' : 'none';
        
        if (!val) {
            const activeCat = document.querySelector('.category-item.active');
            if (activeCat) renderTags(activeCat.innerText);
            return;
        }

        tagsList.innerHTML = '';
        Object.values(fullData).flat().forEach(tag => {
            if (tag.en.toLowerCase().includes(val) || tag.cn.includes(val)) {
                tagsList.appendChild(createTagCard(tag));
            }
        });
    };

    clearBtn.onclick = () => {
        searchInput.value = '';
        clearBtn.style.display = 'none';
        const activeCat = document.querySelector('.category-item.active');
        if (activeCat) renderTags(activeCat.innerText);
        searchInput.focus();
    };
</script>

</body>
</html>
