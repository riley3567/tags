<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优雅 3D 玻璃标签工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, backdrop-filter 0.3s ease;
        }

        /* 核心变量定义 - 加入玻璃拟态和克制的 3D 值 */
        :root {
            /* 1. 背景：改为淡淡的渐变，以便展示玻璃模糊效果 */
            --bg-body: linear-gradient(135deg, #e0e6ed 0%, #f5f7fa 100%);
            
            /* 2. 玻璃拟态核心：半透明背景和模糊 */
            --bg-glass: rgba(255, 255, 255, 0.5); /* 亮色半透明 */
            --glass-blur: blur(10px);              /* 模糊程度 */
            --glass-border: 1px solid rgba(255, 255, 255, 0.2); /* 玻璃亮边 */
            
            /* 3. 基础视觉 */
            --bg-card: #ffffff; /* 备用非透明背景 */
            --text-main: #333333;
            --text-light: #6c757d;
            --header-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --category-item-bg: rgba(0, 0, 0, 0.03);
            --category-item-hover: rgba(0, 0, 0, 0.08);
            --accent-color: #6a11cb;
            --input-border: #ddd;
            --tag-english-color: #030303;
            --tag-chinese-color: #2575fc;
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.07); /* 更柔和的阴影 */
            
            /* 4. 克制的 3D 效果变量 */
            --3d-persp: 2000px; /* 增加透视距离，使倾斜更平缓 */
        }

        .theme-dark {
            /* 暗色玻璃拟态 */
            --bg-body: linear-gradient(135deg, #0f0f12 0%, #1a1a1f 100%);
            --bg-glass: rgba(30, 30, 35, 0.6); /* 暗色半透明 */
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            
            --bg-card: #1e1e1e;
            --text-main: #eeeeee;
            --text-light: #aaaaaa;
            --header-gradient: linear-gradient(135deg, #4b0d8f 0%, #1545cc 100%);
            --category-item-bg: rgba(255, 255, 255, 0.04);
            --category-item-hover: rgba(255, 255, 255, 0.1);
            --accent-color: #bb86fc;
            --input-border: #444;
            --tag-english-color: #f3f3f3;
            --tag-chinese-color: #87C120;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            background: var(--bg-body);
            background-attachment: fixed; /* 固定背景，增强模糊对比 */
            color: var(--text-main);
            line-height: 1.6;
            perspective: var(--3d-persp);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: var(--header-gradient);
            color: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transform: translateZ(10px); /* 微微浮起，保持立体感 */
        }

        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid var(--accent-color);
            background: var(--bg-card); /* 主题按钮不透明 */
            color: var(--accent-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            box-shadow: var(--shadow);
        }
        .theme-btn:hover {
            transform: scale(1.05);
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            display: none; 
        }

        .search-box {
            width: 100%;
            padding: 14px 45px 14px 20px;
            border: 2px solid var(--input-border);
            border-left: 6px solid var(--accent-color);
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            
            /* --- 修改 1: 字体居右 --- */
            text-align: right;
            
            background-color: var(--bg-card); /* 输入框不透明 */
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(106, 17, 203, 0.1);
        }

        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--category-item-hover);
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            color: var(--text-main);
            display: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .main-content {
            display: flex;
            gap: 30px;
            display: none; 
        }
        
        /* --- 修改 2: 分类列表增加透明玻璃效果 --- */
        .categories-sidebar {
            flex: 1;
            
            /* 玻璃拟态核心样式 */
            background: var(--bg-glass);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); /* 兼容 Safari */
            border: var(--glass-border);
            
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow);
            perspective: var(--3d-persp); 
            align-self: flex-start;
        }
        
        .category-item {
            font-weight: 600;
            padding: 12px 18px;
            margin-bottom: 15px;
            background: var(--category-item-bg);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            /* 优化过渡，使其更平滑 */
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border-bottom: 3px solid rgba(0,0,0,0.05); 
        }
        
        .category-item:hover {
            background: var(--category-item-hover);
            /* --- 修改 3: 克制 3D 浮起 (20px -> 8px) --- */
            transform: translateY(-3px) translateZ(8px); 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .category-item.active {
            background: var(--accent-color);
            color: white;
            /* 点击压入感也相应减小 */
            transform: translateY(1px) translateZ(0px); 
            border-bottom-width: 1px;
            margin-bottom: 17px; 
        }
        
        .tags-display {
            flex: 6;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            align-content: start;
            perspective: var(--3d-persp); 
            padding: 5px; 
        }
        
        /* --- 修改 4: 标签卡增加透明玻璃效果 --- */
        .tag-card {
            /* 玻璃拟态核心样式 */
            background: var(--bg-glass);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            
            border-radius: 15px;
            padding: 28px;
            box-shadow: var(--shadow);
            border-left: 6px solid var(--accent-color);
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            
            /* JS 动态旋转的过渡速率调整为略微跟手但不过分敏锐 */
            transition: 
                transform 0.15s ease-out, 
                box-shadow 0.3s ease,
                background-color 0.3s ease,
                border-color 0.3s ease;
                
            transform: translateZ(0px); 
        }

        .tag-card:hover {
            /* 悬停时的基础阴影深化 */
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.15);
        }
        
        /* --- 修改 5: 克制内部文字浮起 (20px -> 6px) --- */
        .tag-english, .tag-chinese {
            display: block;
            font-weight: 700;
            transform: translateZ(6px); /* 极细微的层级感 */
            transform-style: preserve-3d; 
            backface-visibility: hidden;
        }
        
        .tag-english {
            color: var(--tag-english-color);
            margin-bottom: 10px;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }
        
        .tag-chinese {
            color: var(--tag-chinese-color);
            font-size: 1.05rem;
            opacity: 0.95;
            font-weight: 600;
        }
        
        .loading-text {
            text-align: center;
            padding: 100px;
            font-size: 1.2rem;
            color: var(--text-light);
        }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .categories-sidebar { align-self: stretch; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>标签管理工具</h1>
        </header>
        
        <div class="controls-wrapper">
            <button class="theme-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <div class="search-container" id="searchContainer">
                <input type="text" class="search-box" id="searchInput" placeholder="搜索标签...">
                <button class="clear-btn" id="clearBtn"><i class="fas fa-times"></i></button>
            </div>
        </div>
        
        <div id="loadingView" class="loading-text">
            <i class="fas fa-spinner fa-spin"></i> 正在读取 GitHub Lables.txt...
        </div>

        <div class="main-content" id="mainContainer">
            <aside class="categories-sidebar">
                <h3 style="margin-left:10px; margin-bottom: 22px; opacity: 0.7; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-main);">分类列表</h3>
                <div id="categoriesList"></div>
            </aside>
            <main class="tags-display" id="tagsList"></main>
        </div>
    </div>

    <script>
        let fullData = {};
        // 建议：如果网络不通，请将此 URL 替换为有效的测试数据地址
        const DATA_URL = 'https://raw.githubusercontent.com/riley3567/tags/main/Lables.txt';
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const tagsListContainer = document.getElementById('tagsList');

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            fetchData();
        });

        function initTheme() {
            const savedTheme = localStorage.getItem('user-theme') || 'light';
            applyTheme(savedTheme);
            document.getElementById('themeToggle').onclick = () => {
                const newTheme = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
                applyTheme(newTheme);
            };
        }

        function applyTheme(theme) {
            const btnIcon = document.querySelector('#themeToggle i');
            if (theme === 'dark') {
                document.body.classList.add('theme-dark');
                btnIcon.className = 'fas fa-sun';
                localStorage.setItem('user-theme', 'dark');
            } else {
                document.body.classList.remove('theme-dark');
                btnIcon.className = 'fas fa-moon';
                localStorage.setItem('user-theme', 'light');
            }
        }

        async function fetchData() {
            try {
                const response = await fetch(DATA_URL);
                let text;
                if (!response.ok) {
                    console.warn('读取失败，使用 Mock 数据演示界面');
                    text = `[常用标签]\nbeautiful 美丽的\nfast 快速的\nunique 独特的\nelegant 优雅的\n[开发标签]\ngit 版本控制\nreact 前端框架\npython 编程语言\ndocker 容器技术\n[设计标签]\nui 界面设计\nux 用户体验\nminimalism 极简主义`;
                } else {
                    text = await response.text();
                }
                
                parseData(text);
                
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
                document.getElementById('searchContainer').style.display = 'block';
            } catch (err) {
                console.error(err);
                const mockText = `[常用标签]\nbeautiful 美丽的\nfast 快速的\n[开发标签]\ngit 版本控制\nreact 前端框架`;
                parseData(mockText);
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'flex';
                document.getElementById('searchContainer').style.display = 'block';
            }
        }

        function parseData(content) {
            const lines = content.split(/\r?\n/);
            let currentCat = null;
            fullData = {};
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                if (trimmed.startsWith('[') && trimmed.endsWith(']')) {
                    currentCat = trimmed.slice(1, -1);
                    fullData[currentCat] = [];
                } else if (currentCat && trimmed.includes(' ')) {
                    const idx = trimmed.lastIndexOf(' ');
                    fullData[currentCat].push({
                        en: trimmed.slice(0, idx).trim(),
                        cn: trimmed.slice(idx + 1).trim()
                    });
                }
            });
            renderCategories();
        }

        function renderCategories() {
            const list = document.getElementById('categoriesList');
            list.innerHTML = '';
            const keys = Object.keys(fullData);
            keys.forEach((cat, index) => {
                const div = document.createElement('div');
                div.className = 'category-item' + (index === 0 ? ' active' : '');
                div.innerText = cat;
                div.onclick = () => {
                    document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    searchInput.value = '';
                    clearBtn.style.display = 'none';
                    renderTags(cat);
                };
                list.appendChild(div);
            });
            if (keys.length > 0) renderTags(keys[0]);
        }

        function renderTags(catName) {
            tagsListContainer.innerHTML = '';
            if(fullData[catName]) {
                fullData[catName].forEach(tag => tagsListContainer.appendChild(createTagCard(tag)));
            }
        }

        /* --- 修改 6: 核心 3D 参数降低，使其更克制 --- */
        function createTagCard(tag) {
            const card = document.createElement('div');
            card.className = 'tag-card';
            card.innerHTML = `<span class="tag-english">${tag.en}</span><span class="tag-chinese">${tag.cn}</span>`;
            
            // 复制功能
            card.onclick = () => {
                navigator.clipboard.writeText(tag.en).then(() => {
                    // 简单的复制反馈
                    const originalAccent = card.style.borderLeftColor;
                    card.style.borderLeftColor = 'var(--tag-chinese-color)';
                    setTimeout(() => {
                        card.style.borderLeftColor = originalAccent;
                    }, 400);
                });
            };

            // --- 动态 3D 效果核心逻辑 - 已降低参数 ---
            const maxRotation = 5; // --- 修改 6a: 最大旋转角度大幅降低 (15 -> 5) ---
            const floatZ = 12;     // --- 修改 6b: 悬停时 Z轴浮起高度降低 (30 -> 12) ---

            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const xPct = (x / rect.width) - 0.5;
                const yPct = (y / rect.height) - 0.5;
                
                const rotationY = xPct * maxRotation * 2; 
                const rotationX = -yPct * maxRotation * 2; 
                
                // 应用克制的 3D 变换
                card.style.transform = `perspective(2000px) rotateX(${rotationX}deg) rotateY(${rotationY}deg) translateZ(${floatZ}px)`;
            });

            // 鼠标移出：平滑复位
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(2000px) rotateX(0deg) rotateY(0deg) translateZ(0px)';
            });

            return card;
        }

        // 搜索功能
        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase().trim();
            clearBtn.style.display = val ? 'flex' : 'none';
            if (!val) {
                const activeCatEl = document.querySelector('.category-item.active');
                if (activeCatEl) renderTags(activeCatEl.innerText);
                return;
            }
            tagsListContainer.innerHTML = '';
            Object.values(fullData).flat().forEach(tag => {
                if (tag.en.toLowerCase().includes(val) || tag.cn.includes(val)) {
                    tagsListContainer.appendChild(createTagCard(tag));
                }
            });
            
            // 搜索结果为空处理
            if (tagsListContainer.innerHTML === '') {
                tagsListContainer.innerHTML = '<div class="loading-text" style="grid-column: 1/-1; transform: translateZ(5px);">未找到相关标签...</div>';
            }
        };

        clearBtn.onclick = () => {
            searchInput.value = '';
            clearBtn.style.display = 'none';
            const activeCatEl = document.querySelector('.category-item.active');
            if (activeCatEl) renderTags(activeCatEl.innerText);
            searchInput.focus();
        };
    </script>
</body>
</html>
