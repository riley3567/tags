<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .description {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
			visibility: hidden;
        }
        
        .categories {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            max-height: 800px;
            overflow-y: auto;
			weight: 100px;
        }
		
        .tags-container {
            flex: 7;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
			max-height: 200px;
        }
        
        .category-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .category-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .category-item.active {
            background: #6a11cb;
            color: white;
        }
        
        .tag-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
        
        .tag-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }
        
        .tag-category {
            font-size: 0.9rem;
            color: #6a11cb;
            margin-bottom: 0px;
            font-weight: 500;
        }
        
        .tag-content {
            font-size: 1.0rem;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .tag-english {
            color: #2575fc;
        }
        
        .tag-chinese {
            color: #28a745;
        }
        
        .file-upload {
            background: white;
            border-radius: 10px;
            padding: 0px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        .upload-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
            margin-top: 15px;
        }
        
        .upload-btn:hover {
            background: #5a0fb8;
        }
        
        .search-box {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        
        .no-tags {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 1.1rem;
        }
        
        .file-format {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
        }
        
        .file-format h3 {
            margin-bottom: 10px;
            color: #6a11cb;
        }
        
        .file-format pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
        }
        
        .upload-area {
            border: 2px dashed #6a11cb;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
            background: #f9f7ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            background: #f0ebff;
        }
        
        .upload-icon {
            font-size: 3rem;
            color: #6a11cb;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .tags-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>标签管理工具</h1>
            <!-- <p class="description">上传标签文件，管理并查看中英文标签</p> -->
        </header>
        
        <div class="file-upload">
            <div class="upload-area" id="dropArea">
                <p>点击或拖拽文件到此处上传</p>
                <p style="font-size: 0.9rem; color: #666;">支持.txt文本文件</p>
            </div>
            
            <input type="file" id="fileInput" accept=".txt" style="display: none;">
        </div>
        
        <input type="text" class="search-box" placeholder="搜索标签..." id="searchInput">
        
        <div class="main-content" id="main-content">
		
            <div class="categories">
                <h3>分类</h3>
                <div id="categoriesList">
                    <div class="no-tags">
                        <p>请上传文件查看分类</p>
                    </div>
                </div>
            </div>
            
            <div class="tags-container" id="tagsContainer">
                <div class="no-tags">
                    <p>暂无标签数据，请上传文件或选择分类</p>
                </div>
            </div>
			
        </div>
    </div>

    <script>
        // 全局变量存储标签数据
        let tagsData = {};
        
        // 文件上传处理
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        
        fileInput.addEventListener('change', handleFileSelect);
        
        // 拖拽上传功能
        dropArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropArea.style.background = '#e8deff';
        });
        
        dropArea.addEventListener('dragleave', function() {
            dropArea.style.background = '#f9f7ff';
        });
        
        dropArea.addEventListener('drop', function(e) {
            e.preventDefault();
            dropArea.style.background = '#f9f7ff';
            
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect(e);
            }
        });
        
        dropArea.addEventListener('click', function() {
            fileInput.click();
        });
        
        // 处理文件选择
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    parseFileContent(content);
                };
                reader.readAsText(file);
                
                // 更新UI显示文件名
                dropArea.innerHTML = `
                    <p>已选择文件: ${file.name}</p>
                    <p style="font-size: 0.9rem; color: #666;">文件解析成功</p>
                `;
            }
        }
        
        // 解析文件内容 - 使用最后一个空格作为分隔符
        function parseFileContent(content) {
            tagsData = {};
            const lines = content.split('\n');
            let currentCategory = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // 跳过空行
                if (line === '') continue;
                
                // 检查是否是分类行
                if (line.startsWith('[') && line.endsWith(']')) {
                    currentCategory = line.substring(1, line.length - 1);
                    tagsData[currentCategory] = {
                        name: currentCategory,
                        tags: []
                    };
                } 
                // 检查是否是标签行（包含空格）
                else if (currentCategory && line.includes(' ')) {
                    // 找到最后一个空格的位置
                    const lastSpaceIndex = line.lastIndexOf(' ');
                    
                    if (lastSpaceIndex !== -1) {
                        // 使用最后一个空格分割字符串
                        const englishPart = line.substring(0, lastSpaceIndex).trim();
                        const chinesePart = line.substring(lastSpaceIndex + 1).trim();
                        
                        tagsData[currentCategory].tags.push({
                            english: englishPart,
                            chinese: chinesePart
                        });
                    }
                }
            }
			
			document.getElementById("main-content").style.visibility = "visible";
            
            // 显示分类和标签
            displayCategoriesAndTags();
        }
        
		
        // 显示分类和标签
        function displayCategoriesAndTags() {
            // 显示分类
            const categoriesList = document.getElementById('categoriesList');
            categoriesList.innerHTML = '';
            
            const categories = Object.keys(tagsData);
            
            if (categories.length === 0) {
                categoriesList.innerHTML = '<div class="no-tags"><p>未找到分类</p></div>';
                return;
            }
            
            for (const category of categories) {
                const categoryElement = document.createElement('div');
                categoryElement.className = 'category-item';
                categoryElement.textContent = tagsData[category].name;
                categoryElement.dataset.category = category;
                
                categoryElement.addEventListener('click', function() {
                    // 移除所有active类
                    document.querySelectorAll('.category-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    // 添加active类到当前项
                    this.classList.add('active');
                    // 显示该分类的标签
                    displayTags(category);
                });
                
                categoriesList.appendChild(categoryElement);
            }
            
            // 默认显示第一个分类
            categoriesList.children[0].classList.add('active');
            displayTags(categories[0]);
        }
        
        // 显示特定分类的标签
        function displayTags(categoryKey) {
            const tagsContainer = document.getElementById('tagsContainer');
            tagsContainer.innerHTML = '';
            
            const category = tagsData[categoryKey];
            
            if (!category || category.tags.length === 0) {
                tagsContainer.innerHTML = '<div class="no-tags"><p>此分类没有标签</p></div>';
                return;
            }
            
            category.tags.forEach(tag => {
                const tagCard = document.createElement('div');
                tagCard.className = 'tag-card';
                
                tagCard.innerHTML = `
                    <!-- <div class="tag-category">${category.name}</div> -->
                    <div class="tag-content">
                        <span class="tag-english">${tag.english}</span>
						<br>
                        <span class="tag-chinese">${tag.chinese}</span>
                    </div>
                `;
                
                tagsContainer.appendChild(tagCard);
            });
        }
        
        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            
            if (!searchTerm) {
                // 如果搜索框为空，显示当前选中分类的标签
                const activeCategory = document.querySelector('.category-item.active');
                if (activeCategory) {
                    displayTags(activeCategory.dataset.category);
                }
                return;
            }
            
            // 在所有标签中搜索
            const tagsContainer = document.getElementById('tagsContainer');
            tagsContainer.innerHTML = '';
            
            let foundResults = false;
            
            for (const [key, category] of Object.entries(tagsData)) {
                const matchingTags = category.tags.filter(tag => 
                    tag.english.toLowerCase().includes(searchTerm) || 
                    tag.chinese.toLowerCase().includes(searchTerm)
                );
                
                if (matchingTags.length > 0) {
                    foundResults = true;
                    
                    matchingTags.forEach(tag => {
                        const tagCard = document.createElement('div');
                        tagCard.className = 'tag-card';
                        
                        tagCard.innerHTML = `
                            <!-- <div class="tag-category">${category.name}</div> -->
                            <div class="tag-content">
                                <span class="tag-english">${tag.english}</span>
								<br>
                                <span class="tag-chinese">${tag.chinese}</span>
                            </div>
                        `;
                        
                        tagsContainer.appendChild(tagCard);
                    });
                }
            }
            
            if (!foundResults) {
                tagsContainer.innerHTML = '<div class="no-tags"><p>没有找到匹配的标签</p></div>';
            }
        });
    </script>
</body>
</html>
