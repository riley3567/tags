<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简导航站</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #00d4ff;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e);
            color: var(--text-color);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 搜索区域 */
        .search-wrapper {
            margin-bottom: 40px;
            text-align: right;
        }

        #site-search {
            width: 300px;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: white;
            text-align: right; /* 文字居右 */
            outline: none;
            transition: all 0.3s ease;
        }

        #site-search:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* 分类块 */
        .category-item {
            margin-bottom: 35px;
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .category-title {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
        }

        /* 标签卡片网格 */
        .tag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .tag-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            color: #ddd;
            font-size: 0.95rem;
            border: 1px solid transparent;
            /* 3D 效果平滑过渡 */
            transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1), 
                        background 0.3s ease, 
                        border 0.3s ease;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tag-card:hover {
            transform: translateY(-5px) translateZ(0); /* 向上微移，无晃动 */
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            color: var(--accent-color);
        }

        /* 响应式微调 */
        @media (max-width: 600px) {
            #site-search { width: 100%; }
            .tag-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">

<script>
    // 简单的站内实时搜索功能
    const searchInput = document.getElementById('site-search');
    const cards = document.querySelectorAll('.tag-card');

    searchInput.addEventListener('input', (e) => {
        const text = e.target.value.toLowerCase();
        cards.forEach(card => {
            const isVisible = card.textContent.toLowerCase().includes(text);
            card.style.display = isVisible ? 'block' : 'none';
        });
    });
</script>
